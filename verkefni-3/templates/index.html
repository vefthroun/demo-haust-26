{% extends "layout.html" %}
{% block title %}Skilaboðaskjóðan{% endblock %}
{% block content %}
    <h3>Nýjustu skilaboðin</h3>
    {% for post in posts %}
        <article>
            <p>{{ post.content }}</p>
            <small>Sent af: {{ post.username }} | {{ post.timestamp }}</small>
        </article>
        <hr>
    {% endfor %}
{% endblock %}
