{% include "header.html" %}

<main class="container">
	<h1>Nýskráning</h1>
	<form method="POST">
		<input type="text" name="nafn" placeholder="Nafn nemanda">
		<input type="email" name="netfang" placeholder="Netfang">
    <input type="password" name="psw" placeholder="Lykilorð">
    <input type="password" name="psw" placeholder="Lykilorð endurtekið">
		<button type="submit">Vista</button>
	</form>
</main>
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <ul class="flashes">
    {% for message in messages %}
      <li>{{ message }}</li>
    {% endfor %}
    </ul>
  {% endif %}
{% endwith %}
<p class="flashes">Lykilorð verður útfært í 3. verkefni</p>
{% include "footer.html" %}
