{% extends "layout.html" %}
{% block title %}Skilaboðaskjóðan{% endblock %}
{% block content %}
    <h3>Nýjustu skilaboðin</h3>
    <div class="newpost">
    {% for post in posts %}
        <article>
            <p>{{ post.content }}</p>
            <small>Skrifað þann: {{ post.timestamp }}. Höfundur: {{ post.username }}</small>
        </article>
        <hr>
    {% endfor %}
    </div>
{% endblock %}
