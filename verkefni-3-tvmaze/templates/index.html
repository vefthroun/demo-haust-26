{% extends "layout.html" %}
{% block title %}TVmaze sjónvarpsþættir{% endblock %}
{% block content %}
    <section class="col-5">
        {% for i in listi%}
            <div>
                <p>{{ i["name"] }}</p>
                <a href="/shows/{{ i['id'] }}">
                    <img src="{{i['image']['medium']}}" title="{{ i['name'] }}">
                </a>
            </div>
        {%endfor%}
    </section>
{% endblock %}
