<!DOCTYPE html>
<html lang="is">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block head %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <title>{% block title %}{% endblock %} - Verkefni 3.</title>
    <style>
        .error {color:red}
    </style>
    {% endblock %}
</head>
<body class="container">
    <nav>
        <a href="{{ url_for('index') }}"> Forsíða</a> |
        <a href="{{ url_for('sign_in') }}"> Innskráning</a> |
        <a href="{{ url_for('signup') }}"> Nýskráning</a>  |
        <a href="{{ url_for('profile') }}"> Notendur</a> 
    </nav>
    <p>&nbsp;</p>
    <header>
        <h1>{% block header %}{% endblock %}</h1>
    </header>
    <main>
        {% block main %}{% endblock %}
    </main>
    <hr>
    <footer>
       <p>{% block footer %}{% endblock %}, Vefforitun 1. Vor 2025.</p> 
    </footer>
</body>
</html>
